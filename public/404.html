<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>绿色心灵 - 心理健康服务平台</title>
    <script>
      // SPA fallback for GitHub Pages
      sessionStorage.redirect = location.href;
    </script>
  </head>
  <body>
    <script>
      // Redirect back to the original location after 100ms
      setTimeout(function() {
        var redirect = sessionStorage.redirect;
        if (redirect) {
          sessionStorage.removeItem('redirect');
          location.href = redirect.replace(/\/404\.html$/, '/');
        }
      }, 100);
    </script>
  </body>
</html>
